pre-commit:
  parallel: true
  commands:
    lint:
      glob: '**/*.{ts,js,mjs}'
      run: npm run lint
    format:
      run: npm run format
    typecheck:
      glob: '**/*.ts'
      run: npm run typecheck

pre-push:
  parallel: true
  commands:
    test:
      run: npm run test
    build:
      run: npm run build
